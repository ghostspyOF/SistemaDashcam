
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoCam Pro - Dashcam Inteligente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-puro: #000000;
            --laranja-vivo: #ff6600;
            --laranja-glow: rgba(255, 102, 0, 0.3);
            --vidro-bg: rgba(20, 20, 20, 0.65);
            --vidro-borda: rgba(255, 102, 0, 0.25);
            --vidro-blur: blur(20px);
            --card-bg: rgba(30, 30, 30, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-puro);
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* --- TELA INICIAL (DASHBOARD) --- */
        .dashboard {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .main-cam-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--vidro-bg);
            border: 2px solid var(--laranja-vivo);
            box-shadow: 0 0 30px var(--laranja-glow);
            backdrop-filter: var(--vidro-blur);
            -webkit-backdrop-filter: var(--vidro-blur);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .main-cam-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 45px var(--laranja-vivo);
        }

        .main-cam-btn i {
            font-size: 4rem;
            color: var(--laranja-vivo);
        }

        .app-title {
            margin-top: 25px;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .app-status-bar {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
        }

        /* Botão Inferior de Ver Vídeos */
        .gallery-trigger-btn {
            position: absolute;
            bottom: 40px;
            background: var(--vidro-bg);
            border: 1px solid var(--vidro-borda);
            backdrop-filter: var(--vidro-blur);
            -webkit-backdrop-filter: var(--vidro-blur);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .gallery-trigger-btn i {
            color: var(--laranja-vivo);
        }

        .gallery-trigger-btn:active {
            transform: scale(0.95);
            background: rgba(255, 102, 0, 0.15);
        }

        /* --- MODAL DA SELEÇÃO (ESTILO VIDRO) --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--vidro-bg);
            border: 1px solid var(--vidro-borda);
            backdrop-filter: var(--vidro-blur);
            -webkit-backdrop-filter: var(--vidro-blur);
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transform: translateY(40px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header-icon {
            width: 65px;
            height: 65px;
            background: rgba(255, 102, 0, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 18px auto;
            border: 1px solid rgba(255, 102, 0, 0.3);
        }

        .modal-header-icon i {
            color: var(--laranja-vivo);
            font-size: 1.8rem;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .modal-buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .modal-btn i {
            font-size: 1.5rem;
            color: #ccc;
        }

        .modal-btn span {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .modal-btn:active {
            background: rgba(255, 102, 0, 0.15);
            border-color: var(--laranja-vivo);
        }

        .modal-btn:active i {
            color: var(--laranja-vivo);
        }

        .modal-close-area {
            margin-top: 22px;
            font-size: 0.9rem;
            color: #777;
            cursor: pointer;
            text-decoration: underline;
        }

        /* --- TELA DE GRAVAÇÃO ATIVA --- */
        .recording-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-puro);
            display: none;
            flex-direction: column;
            z-index: 50;
        }

        .viewfinders-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: #000;
            position: relative;
        }

        .viewfinders-wrapper.split-mode video {
            height: 50%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #030303;
        }

        video.front-camera-view {
            transform: scaleX(-1);
        }

        /* --- HUD SOBREPOSTO DE CONTROLE --- */
        .recording-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            pointer-events: none;
            z-index: 60;
            transition: opacity 0.3s ease;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .rec-indicator {
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: var(--vidro-blur);
            border: 1px solid rgba(255, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        .rec-dot {
            width: 10px;
            height: 10px;
            background-color: #ff0000;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
            box-shadow: 0 0 8px #ff0000;
        }

        /* Classe para estado de pausa no indicador */
        .rec-dot.paused {
            background-color: #ffcc00 !important;
            box-shadow: 0 0 8px #ffcc00 !important;
            animation: none !important;
        }

        .rec-timer {
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
        }

        .hud-system-info {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 10px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hud-bottom {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .hud-btn {
            background: var(--vidro-bg);
            border: 1px solid var(--vidro-borda);
            backdrop-filter: var(--vidro-blur);
            -webkit-backdrop-filter: var(--vidro-blur);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .hud-btn i {
            color: var(--laranja-vivo);
        }

        .hud-btn:active {
            background: rgba(255, 102, 0, 0.2);
            transform: scale(0.95);
        }

        /* --- TELA PRETA ABSOLUTA (OCULTAR / BLACKOUT) --- */
        .blackout-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-puro);
            z-index: 80;
            display: none;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 40px;
        }

        .restore-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(25, 25, 25, 0.5);
            border: 1px solid rgba(255, 102, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        .restore-inner-dot {
            width: 10px;
            height: 10px;
            background-color: var(--laranja-vivo);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--laranja-vivo);
        }

        /* --- PAINEL DE VÍDEOS INTERNO (GALERIA SISTEMA) --- */
        .gallery-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-puro);
            z-index: 90;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,102,0,0.2);
            margin-bottom: 20px;
        }

        .gallery-title {
            font-size: 1.3rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gallery-title i {
            color: var(--laranja-vivo);
        }

        .close-gallery-btn {
            background: var(--vidro-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            flex: 1;
            margin-bottom: 100px; /* Garante espaço para o painel inferior de ações */
        }

        .video-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            min-height: 130px;
        }

        .video-card-icon {
            font-size: 1.8rem;
            color: var(--laranja-vivo);
            margin-bottom: 8px;
        }

        .video-card-info {
            font-size: 0.75rem;
            color: #ccc;
            word-break: break-all;
            line-height: 1.3;
        }

        .video-card-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .card-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card-btn-play {
            background: rgba(255, 102, 0, 0.2);
            border: 1px solid var(--laranja-vivo);
        }

        .card-btn-dl {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-videos-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: #666;
            padding: 40px 0;
            font-size: 0.95rem;
        }

        /* Painel inferior com ações em massa na pasta de armazenamento */
        .gallery-bulk-actions {
            position: sticky;
            bottom: -20px;
            left: 0;
            width: calc(100% + 40px);
            margin-left: -20px;
            margin-top: auto;
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid var(--vidro-borda);
            backdrop-filter: var(--vidro-blur);
            -webkit-backdrop-filter: var(--vidro-blur);
            padding: 20px;
            display: flex;
            gap: 15px;
            z-index: 95;
        }

        .bulk-btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #fff;
            border: none;
            transition: all 0.2s ease;
        }

        .bulk-btn-download {
            background: var(--laranja-vivo);
            box-shadow: 0 4px 15px var(--laranja-glow);
        }

        .bulk-btn-download:active {
            transform: scale(0.97);
            background: #e05a00;
        }

        .bulk-btn-delete {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff3333;
        }

        .bulk-btn-delete:active {
            transform: scale(0.97);
            background: rgba(255, 0, 0, 0.35);
        }

        /* --- PLAYER DE VÍDEO POPUP INTERNO --- */
        .video-player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 110;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-player-overlay video {
            max-width: 100%;
            max-height: 70%;
            border-radius: 12px;
            border: 1px solid var(--vidro-borda);
            background: #000;
        }

        .player-controls {
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }

        /* Notificação Toast Flutuante */
        .toast-notify {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(20,20,20,0.9);
            border: 1px solid var(--laranja-vivo);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #fff;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-align: center;
            white-space: nowrap;
        }

        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }

        /* Responsividade Horizontal (Modo Paisagem para Carro) */
        @media (orientation: landscape) {
            .viewfinders-wrapper.split-mode {
                flex-direction: row;
            }
            .viewfinders-wrapper.split-mode video {
                width: 50%;
                height: 100%;
            }
            .modal-buttons-grid {
                flex-direction: row;
            }
            .modal-content {
                max-width: 580px;
            }
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="toast-notify" id="toastSystem">Mensagem do sistema</div>

    <div class="dashboard" id="dashboardScreen">
        <div class="main-cam-btn" onclick="openCameraModal()">
            <i class="fa-solid fa-camera"></i>
        </div>
        <h1 class="app-title">AutoCam Dashcam</h1>
        <div class="app-status-bar">
            <span class="status-dot"></span>
            <span id="storageCounterDisplay">Armazenamento: 0 / 32 vídeos</span>
        </div>

        <button class="gallery-trigger-btn" onclick="openGallery()">
            <i class="fa-solid fa-folder-open"></i> Ver Vídeos Gravados
        </button>
    </div>

    <div class="modal-overlay" id="cameraModal">
        <div class="modal-content">
            <div class="modal-header-icon">
                <i class="fa-solid fa-sliders"></i>
            </div>
            <h3>Selecione o Modo de Captura</h3>
            
            <div class="modal-buttons-grid">
                <div class="modal-btn" onclick="startCapture('front')">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Câmera Frontal</span>
                </div>
                <div class="modal-btn" onclick="startCapture('back')">
                    <i class="fa-solid fa-road"></i>
                    <span>Câmera Traseira</span>
                </div>
                <!-- Terceiro Botão Solicitado -->
                <div class="modal-btn" onclick="startCapture('alternating')" style="border-color: var(--laranja-vivo);">
                    <i class="fa-solid fa-shuffle"></i>
                    <span>Alternar 30s (4 Minutos)</span>
                </div>
            </div>

            <div class="modal-close-area" onclick="closeCameraModal()">
                Cancelar e Voltar
            </div>
        </div>
    </div>

    <div class="recording-container" id="videoContainer">
        <div class="viewfinders-wrapper" id="viewWrapper">
            <video id="videoElement1" autoplay playsinline muted></video>
            <video id="videoElement2" autoplay playsinline muted style="display: none;"></video>
        </div>

        <div class="recording-hud" id="hudControl">
            <div class="hud-top">
                <div class="rec-indicator">
                    <div class="rec-dot" id="recDotElement"></div>
                    <div class="rec-timer" id="timerDisplay">00:00</div>
                </div>
                <div class="hud-system-info" id="liveCounterHUD">
                    Loop Contínuo<br>Gravando no Aparelho
                </div>
            </div>

            <div class="hud-bottom">
                <button class="hud-btn" onclick="stopCaptureSystem()">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </button>
                
                <!-- Botão Adicionado de Play/Pausa no HUD -->
                <button class="hud-btn" onclick="togglePlayPauseRecording()" id="playPauseBtn" style="border-color: #ff9900;">
                    <i class="fa-solid fa-play" id="playPauseIcon"></i> <span id="playPauseText">Iniciar</span>
                </button>

                <button class="hud-btn" onclick="toggleBlackout(true)">
                    <i class="fa-solid fa-eye-slash"></i> Ocultar
                </button>
            </div>
        </div>

        <div class="blackout-overlay" id="blackoutView">
            <div class="restore-btn" onclick="toggleBlackout(false)">
                <div class="restore-inner-dot"></div>
            </div>
        </div>
    </div>

    <div class="gallery-panel" id="galleryPanel">
        <div class="gallery-header">
            <div class="gallery-title">
                <i class="fa-solid fa-folder-closed"></i> Armazenamento Interno (<span id="galleryCount">0</span>/32)
            </div>
            <button class="close-gallery-btn" onclick="closeGallery()">
                <i class="fa-solid fa-xmark"></i> Fechar
            </button>
        </div>
        
        <div class="video-grid" id="videoGrid"></div>
        
        <!-- Botões Adicionados de Ações em Massa no Final do Armazenamento -->
        <div class="gallery-bulk-actions">
            <button class="bulk-btn bulk-btn-download" onclick="downloadAllVideos()">
                <i class="fa-solid fa-cloud-arrow-down"></i> Download
            </button>
            <button class="bulk-btn bulk-btn-delete" onclick="deleteAllVideos()">
                <i class="fa-solid fa-trash-fire"></i> Excluir
            </button>
        </div>
    </div>

    <div class="video-player-overlay" id="playerOverlay">
        <video id="internalPlayer" controls autoplay></video>
        <div class="player-controls">
            <button class="hud-btn" onclick="closeInternalPlayer()">
                <i class="fa-solid fa-circle-xmark"></i> Fechar Reprodutor
            </button>
        </div>
    </div>

    <!-- Canvas Escondido para Processar a Estampa de Texto em Tempo Real -->
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // CONFIGURAÇÕES E ESTADO GLOBAL
        let streams = [];
        let recorders = [];
        let loopInterval = null;
        let elapsedTimer = null;
        let canvasRenderInterval = null;
        let alternatingInterval = null; // Intervalo para alternar câmera de 30s
        let secondsElapsed = 0;
        let chunkDuration = 120000; // 2 minutos padrão
        const maxVideoLimit = 32;
        
        // Controle do estado do play/pause manual requisitado
        let isRecordingActive = false;
        let currentModeCaptured = '';
        let currentActiveVideoElement = null; // Identifica qual elemento de vídeo está ativo no Canvas

        // Elementos do DOM
        const cameraModal = document.getElementById('cameraModal');
        const videoContainer = document.getElementById('videoContainer');
        const viewWrapper = document.getElementById('viewWrapper');
        const video1 = document.getElementById('videoElement1');
        const video2 = document.getElementById('videoElement2');
        const timerDisplay = document.getElementById('timerDisplay');
        const blackoutView = document.getElementById('blackoutView');
        const hudControl = document.getElementById('hudControl');
        const toastSystem = document.getElementById('toastSystem');
        const galleryPanel = document.getElementById('galleryPanel');
        const videoGrid = document.getElementById('videoGrid');
        const playerOverlay = document.getElementById('playerOverlay');
        const internalPlayer = document.getElementById('internalPlayer');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        // INICIALIZAÇÃO DO BANCO DE DADOS LOCAL (IndexedDB)
        let db = null;
        const dbRequest = indexedDB.open("AutoCamStorage", 1);

        dbRequest.onupgradeneeded = function(e) {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("videos")) {
                database.createObjectStore("videos", { keyPath: "id", autoIncrement: true });
            }
        };

        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            updateStorageUI();
        };

        dbRequest.onerror = function() {
            showToast("Erro ao inicializar armazenamento interno.");
        };

        function showToast(text) {
            toastSystem.innerText = text;
            toastSystem.classList.add('show');
            setTimeout(() => toastSystem.classList.remove('show'), 3500);
        }

        function updateStorageUI() {
            if (!db) return;
            const transaction = db.transaction(["videos"], "readonly");
            const store = transaction.objectStore("videos");
            const countRequest = store.count();

            countRequest.onsuccess = function() {
                const total = countRequest.result;
                document.getElementById('storageCounterDisplay').innerText = `Armazenamento: ${total} / ${maxVideoLimit} vídeos`;
                document.getElementById('galleryCount').innerText = total;
                document.getElementById('liveCounterHUD').innerHTML = `Loop Ativo<br>Vídeos salvos: ${total}/${maxVideoLimit}`;
            };
        }

        function openCameraModal() { cameraModal.classList.add('active'); }
        function closeCameraModal() { cameraModal.classList.remove('active'); }

        // Inicializador de Captura de Mídia
        async function startCapture(mode) {
            closeCameraModal();
            document.getElementById('dashboardScreen').style.opacity = '0';
            videoContainer.style.display = 'flex';
            
            video1.style.display = 'block';
            video2.style.display = 'none';
            video1.className = '';
            video2.className = '';
            viewWrapper.classList.remove('split-mode');
            
            isRecordingActive = false;
            currentModeCaptured = mode;
            updatePlayPauseButtonUI();

            try {
                if (mode === 'front') {
                    video1.classList.add('front-camera-view');
                    currentActiveVideoElement = video1;
                    await setupSingleCamera({ video: { facingMode: "user" }, audio: true }, video1);
                } else if (mode === 'back') {
                    currentActiveVideoElement = video1;
                    await setupSingleCamera({ video: { facingMode: { exact: "environment" } }, audio: true }, video1).catch(async () => {
                        await setupSingleCamera({ video: { facingMode: "environment" }, audio: true }, video1);
                    });
                } else if (mode === 'alternating') {
                    // Modo Alternante solicitado: Configura 4 minutos (240000ms) de chunk total
                    chunkDuration = 240000;
                    video1.classList.add('front-camera-view');
                    currentActiveVideoElement = video1;
                    
                    // Inicializa os fluxos de ambas as câmeras simultaneamente para troca rápida
                    const streamFront = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                    video1.srcObject = streamFront;
                    streams.push(streamFront);

                    let streamBack;
                    try {
                        streamBack = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio: true });
                    } catch {
                        streamBack = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    }
                    video2.srcObject = streamBack;
                    streams.push(streamBack);

                    video1.onloadedmetadata = () => {
                        hiddenCanvas.width = video1.videoWidth || 1280;
                        hiddenCanvas.height = video1.videoHeight || 720;
                        
                        startCanvasStamping();
                        
                        // Combina o vídeo do Canvas com a faixa de áudio ativa
                        const canvasStream = hiddenCanvas.captureStream(30);
                        const audioTrack = streamFront.getAudioTracks()[0];
                        if (audioTrack) {
                            canvasStream.addTrack(audioTrack);
                        }
                        
                        startMediaRecorder(canvasStream, "Alternante");
                    };
                }

                showToast("Câmera aberta. Posicione o aparelho e clique em Iniciar.");

            } catch (err) {
                alert("Falha de acesso às câmeras/microfone: " + err.message);
                stopCaptureSystem();
            }
        }

        async function setupSingleCamera(constraints, videoTarget) {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoTarget.srcObject = stream;
            streams.push(stream);
            
            videoTarget.onloadedmetadata = () => {
                hiddenCanvas.width = videoTarget.videoWidth || 1280;
                hiddenCanvas.height = videoTarget.videoHeight || 720;
                
                startCanvasStamping();
                
                const canvasStream = hiddenCanvas.captureStream(30); 
                const audioTrack = stream.getAudioTracks()[0];
                if (audioTrack) {
                    canvasStream.addTrack(audioTrack);
                }
                
                startMediaRecorder(canvasStream, "Camera");
            };
        }

        // Desenha quadro a quadro o vídeo original injetando os textos
        function startCanvasStamping() {
            if (canvasRenderInterval) clearInterval(canvasRenderInterval);
            
            canvasRenderInterval = setInterval(() => {
                if (!currentActiveVideoElement || currentActiveVideoElement.paused || currentActiveVideoElement.ended) return;
                
                ctx.clearRect(0, 0, hiddenCanvas.width, hiddenCanvas.height);
                
                if (currentActiveVideoElement.classList.contains('front-camera-view')) {
                    ctx.save();
                    ctx.translate(hiddenCanvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(currentActiveVideoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                    ctx.restore();
                } else {
                    ctx.drawImage(currentActiveVideoElement, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                }
                
                ctx.fillStyle = "#ff6600"; 
                ctx.shadowColor = "black";
                ctx.shadowBlur = 6;
                ctx.lineWidth = 4;
                ctx.strokeStyle = "black";
                
                // Formata data e hora
                const d = new Date();
                const dia = String(d.getDate()).padStart(2, '0');
                const mes = String(d.getMonth() + 1).padStart(2, '0');
                const ano = d.getFullYear();
                const hora = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                const seg = String(d.getSeconds()).padStart(2, '0');
                
                // Formata minutos correndo
                let minsElapsed = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
                let secsElapsed = String(secondsElapsed % 60).padStart(2, '0');
                
                // Frase única solicitada na parte de baixo
                const textoFraseUnica = `Mayckon: ${dia}/${mes}/${ano} - ${hora}:${min}:${seg} (${minsElapsed}:${secsElapsed})`;
                
                ctx.font = "bold " + Math.max(18, hiddenCanvas.height * 0.038) + "px monospace";
                ctx.textAlign = "center";
                const xCentro = hiddenCanvas.width / 2;
                const yBase = hiddenCanvas.height * 0.93;
                
                ctx.strokeText(textoFraseUnica, xCentro, yBase);
                ctx.fillText(textoFraseUnica, xCentro, yBase);
                
                ctx.shadowBlur = 0;
            }, 33);
        }

        function startMediaRecorder(stream, label) {
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm;codecs=vp8' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' }; 
                }
            }

            const recorder = new MediaRecorder(stream, options);
            let chunks = [];

            recorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) chunks.push(e.data);
            };

            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: recorder.mimeType });
                chunks = [];
                
                if (blob.size > 5000) { 
                    await saveVideoToInternalDatabase(blob, label);
                }
                
                if (stream.active && isRecordingActive) {
                    recorder.start();
                }
            };

            recorders.push({ recorderInstance: recorder, streamInstance: stream, labelInstance: label });
        }

        function togglePlayPauseRecording() {
            if (recorders.length === 0) return;

            if (!isRecordingActive) {
                isRecordingActive = true;
                recorders.forEach(item => {
                    if (item.recorderInstance.state === "inactive") {
                        item.recorderInstance.start();
                    }
                });
                startTimers();
                
                if (!loopInterval) {
                    loopInterval = setInterval(() => {
                        if (isRecordingActive) {
                            recorders.forEach(item => {
                                if(item.recorderInstance.state !== "inactive") item.recorderInstance.stop();
                            });
                        }
                    }, chunkDuration);
                }

                // Se for o modo alternante, ativa a troca de câmera de 30 em 30 segundos
                if (currentModeCaptured === 'alternating' && !alternatingInterval) {
                    alternatingInterval = setInterval(() => {
                        if (isRecordingActive) {
                            if (currentActiveVideoElement === video1) {
                                currentActiveVideoElement = video2;
                                video1.style.display = 'none';
                                video2.style.display = 'block';
                            } else {
                                currentActiveVideoElement = video1;
                                video2.style.display = 'none';
                                video1.style.display = 'block';
                            }
                        }
                    }, 30000); 
                }

                showToast("Gravação iniciada!");
            } else {
                isRecordingActive = false;
                clearInterval(loopInterval);
                clearInterval(elapsedTimer);
                clearInterval(alternatingInterval);
                loopInterval = null;
                elapsedTimer = null;
                alternatingInterval = null;

                recorders.forEach(item => {
                    if(item.recorderInstance.state !== "inactive") {
                        item.recorderInstance.stop();
                    }
                });
                showToast("Gravação pausada. Fragmento salvo.");
            }
            updatePlayPauseButtonUI();
        }

        function updatePlayPauseButtonUI() {
            const icon = document.getElementById('playPauseIcon');
            const text = document.getElementById('playPauseText');
            const dot = document.getElementById('recDotElement');

            if (isRecordingActive) {
                icon.className = "fa-solid fa-pause";
                text.innerText = "Pausar";
                dot.classList.remove('paused');
            } else {
                icon.className = "fa-solid fa-play";
                text.innerText = "Gravar";
                dot.classList.add('paused');
            }
        }

        async function saveVideoToInternalDatabase(blob, label) {
            if (!db) return;

            const date = new Date();
            const timestampText = `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')} às ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
            const name = `Vídeo ${label} (${timestampText})`;

            const transactionCheck = db.transaction(["videos"], "readwrite");
            const storeCheck = transactionCheck.objectStore("videos");
            
            storeCheck.getAll().onsuccess = function(event) {
                let allRecords = event.target.result;
                
                if (allRecords.length >= maxVideoLimit) {
                    allRecords.sort((a, b) => a.id - b.id);
                    let overflowCount = (allRecords.length - maxVideoLimit) + 1;
                    for(let i = 0; i < overflowCount; i++) {
                        let oldestId = allRecords[i].id;
                        storeCheck.delete(oldestId);
                    }
                }

                const insertTx = db.transaction(["videos"], "readwrite");
                const insertStore = insertTx.objectStore("videos");
                insertStore.add({
                    name: name,
                    videoBlob: blob,
                    dateAdded: date.getTime()
                });

                insertTx.oncomplete = function() {
                    updateStorageUI();
                };
            };
        }

        function startTimers() {
            if (secondsElapsed === 0) {
                timerDisplay.innerText = "00:00";
            }
            elapsedTimer = setInterval(() => {
                secondsElapsed++;
                let mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
                let secs = String(secondsElapsed % 60).padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;

                // Se atingir 4 minutos (240 segundos) no modo alternante, para e armazena automaticamente
                if (currentModeCaptured === 'alternating' && secondsElapsed >= 240) {
                    showToast("Limite de 4 minutos atingido. Salvando...");
                    stopCaptureSystem();
                }
            }, 1000);
        }

        function stopCaptureSystem() {
            clearInterval(loopInterval);
            clearInterval(elapsedTimer);
            clearInterval(alternatingInterval);
            if (canvasRenderInterval) clearInterval(canvasRenderInterval);
            loopInterval = null;
            elapsedTimer = null;
            alternatingInterval = null;
            canvasRenderInterval = null;
            secondsElapsed = 0;
            chunkDuration = 120000; 

            recorders.forEach(item => {
                if(item.recorderInstance.state !== "inactive") item.recorderInstance.stop();
            });
            recorders = [];

            streams.forEach(stream => {
                stream.getTracks().forEach(track => track.stop());
            });
            streams = [];

            video1.srcObject = null;
            video2.srcObject = null;
            currentActiveVideoElement = null;

            isRecordingActive = false;
            toggleBlackout(false);
            videoContainer.style.display = 'none';
            document.getElementById('dashboardScreen').style.opacity = '1';
            
            setTimeout(() => {
                updateStorageUI();
                showToast("Gravação encerrada. Vídeo armazenado.");
            }, 600);
        }

        function toggleBlackout(activate) {
            if (activate) {
                blackoutView.style.display = 'flex';
                hudControl.style.opacity = '0';
            } else {
                blackoutView.style.display = 'none';
                hudControl.style.opacity = '1';
            }
        }

        function openGallery() {
            if (!db) return;
            videoGrid.innerHTML = "";
            galleryPanel.style.display = "flex";

            const transaction = db.transaction(["videos"], "readonly");
            const store = transaction.objectStore("videos");
            
            store.getAll().onsuccess = function(e) {
                const records = e.target.result;
                records.sort((a, b) => b.id - a.id);

                if (records.length === 0) {
                    videoGrid.innerHTML = `<div class="no-videos-msg">Nenhum bloco de vídeo armazenado na pasta do sistema ainda.</div>`;
                    return;
                }

                records.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div>
                            <div class="video-card-icon"><i class="fa-solid fa-square-rss"></i></div>
                            <div class="video-card-info">
                                <strong>ID: ${item.id}</strong><br>
                                ${item.name}
                            </div>
                        </div>
                        <div class="video-card-actions">
                            <button class="card-btn card-btn-play" onclick="playInternalVideo(${item.id})"><i class="fa-solid fa-play"></i></button>
                            <button class="card-btn card-btn-dl" onclick="downloadSingleVideo(${item.id})"><i class="fa-solid fa-download"></i></button>
                            <button class="card-btn" style="background: rgba(255,0,0,0.15); border: 1px solid #ff3333;" onclick="deleteSingleVideo(${item.id})"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `;
                    videoGrid.appendChild(card);
                });
            };
        }

        function closeGallery() {
            galleryPanel.style.display = "none";
        }

        function playInternalVideo(id) {
            const tx = db.transaction(["videos"], "readonly");
            const store = tx.objectStore("videos");
            store.get(id).onsuccess = function(e) {
                const record = e.target.result;
                if(record) {
                    const videoURL = URL.createObjectURL(record.videoBlob);
                    internalPlayer.src = videoURL;
                    playerOverlay.style.display = "flex";
                }
            };
        }

        function closeInternalPlayer() {
            internalPlayer.pause();
            if (internalPlayer.src) {
                URL.revokeObjectURL(internalPlayer.src);
            }
            internalPlayer.src = "";
            playerOverlay.style.display = "none";
        }

        function downloadSingleVideo(id) {
            const tx = db.transaction(["videos"], "readonly");
            const store = tx.objectStore("videos");
            store.get(id).onsuccess = function(e) {
                const record = e.target.result;
                if(record) {
                    const url = URL.createObjectURL(record.videoBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `AutoCam_Export_ID${id}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast("Download enviado para o dispositivo!");
                }
            };
        }

        function downloadAllVideos() {
            if (!db) return;
            const tx = db.transaction(["videos"], "readonly");
            const store = tx.objectStore("videos");
            store.getAll().onsuccess = function(e) {
                const records = e.target.result;
                if (records.length === 0) {
                    showToast("Não há vídeos para baixar.");
                    return;
                }
                showToast(`Iniciando download em massa de ${records.length} vídeos...`);
                records.forEach((record, index) => {
                    setTimeout(() => {
                        const url = URL.createObjectURL(record.videoBlob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `AutoCam_Bulk_ID${record.id}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, index * 400); 
                });
            };
        }

        function deleteSingleVideo(id) {
            if(confirm("Deseja apagar permanentemente este bloco de vídeo do sistema?")) {
                const tx = db.transaction(["videos"], "readwrite");
                const store = tx.objectStore("videos");
                store.delete(id);
                tx.oncomplete = function() {
                    showToast("Vídeo excluído.");
                    updateStorageUI();
                    openGallery(); 
                };
            }
        }

        function deleteAllVideos() {
            if (!db) return;
            if (confirm("Aviso Crítico: Tem certeza de que deseja deletar TODOS os vídeos armazenados na pasta do sistema de uma só vez?")) {
                const tx = db.transaction(["videos"], "readwrite");
                const store = tx.objectStore("videos");
                const clearRequest = store.clear();
                
                clearRequest.onsuccess = function() {
                    showToast("Todos os vídeos foram removidos do armazenamento.");
                    updateStorageUI();
                    openGallery(); 
                };
            }
        }

        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
            } catch (err) { console.warn(`WakeLock indisponível: ${err.message}`); }
        }
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
        requestWakeLock();
    </script>
</body>
